<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiwi Files - Yuklab oling</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .tab-active {
            background-color: #8bc34a;
            color: black;
            border-radius: 9999px;
        }
        .file-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .file-card:hover {
            transform: translateY(-12px) scale(1.03);
            box-shadow: 0 25px 50px -12px rgb(139 195 74 / 0.25);
        }
        .image-preview {
            width: 100%;
            height: 208px;
            object-fit: cover;
            background-color: #18181b;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white">

    <!-- Header -->
    <header class="bg-black/90 backdrop-blur-md border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="text-4xl">🥝</div>
                <div>
                    <h1 class="text-3xl font-bold tracking-tight">Kiwi Files</h1>
                    <p class="text-sm text-lime-400">Telegram Bot</p>
                </div>
            </div>
            <div class="flex-1 max-w-md mx-8">
                <div class="relative">
                    <input type="text" id="searchInput" 
                           onkeyup="filterCurrentTab()"
                           placeholder="Fayl nomini qidirish..." 
                           class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl py-3 px-5 pl-12 focus:outline-none focus:border-lime-500">
                    <i class="fa-solid fa-magnifying-glass absolute left-5 top-3.5 text-zinc-500"></i>
                </div>
            </div>
        </div>
    </header>

    <!-- Tabs -->
    <div class="max-w-7xl mx-auto px-6 pt-8">
        <div class="flex flex-wrap gap-2 bg-zinc-900 p-2 rounded-3xl w-fit mx-auto" id="tabs">
            <button onclick="showTab(0)" class="tab-active px-8 py-3 font-medium flex items-center gap-2" id="tab0">
                🖼 <span>Rasmlar</span>
            </button>
            <button onclick="showTab(1)" class="px-8 py-3 font-medium flex items-center gap-2 hover:bg-zinc-800" id="tab1">
                🎥 <span>Videolar</span>
            </button>
            <button onclick="showTab(2)" class="px-8 py-3 font-medium flex items-center gap-2 hover:bg-zinc-800" id="tab2">
                📄 <span>Hujjatlar</span>
            </button>
            <button onclick="showTab(3)" class="px-8 py-3 font-medium flex items-center gap-2 hover:bg-zinc-800" id="tab3">
                📦 <span>Boshqalar</span>
            </button>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-6 py-10">
        
        <!-- Rasmlar -->
        <div id="content0" class="tab-content">
            <h2 class="text-3xl font-bold mb-8 flex items-center gap-3"><span class="text-4xl">🖼</span> Rasmlar</h2>
            <div id="grid0" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
        </div>

        <!-- Videolar -->
        <div id="content1" class="tab-content hidden">
            <h2 class="text-3xl font-bold mb-8 flex items-center gap-3"><span class="text-4xl">🎥</span> Videolar</h2>
            <div id="grid1" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
        </div>

        <!-- Hujjatlar -->
        <div id="content2" class="tab-content hidden">
            <h2 class="text-3xl font-bold mb-8 flex items-center gap-3"><span class="text-4xl">📄</span> Hujjatlar</h2>
            <div id="grid2" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
        </div>

        <!-- Boshqalar -->
        <div id="content3" class="tab-content hidden">
            <h2 class="text-3xl font-bold mb-8 flex items-center gap-3"><span class="text-4xl">📦</span> Boshqa fayllar</h2>
            <div id="grid3" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-black py-10 text-center text-zinc-500 border-t border-zinc-900">
        <p class="text-lg">🥝 <strong>Kiwi Bot</strong> orqali yuklangan fayllar</p>
        <p class="mt-2">© 2026 Kiwi Files</p>
    </footer>

    <script>
        let files = [
            // ==================== RASMLAR (rasm preview chiqadi) ====================
            {
                id: 1,
                name: "IMG_20250508_145632.jpg",
                size: "6.8 MB",
                date: "08.05.2026",
                type: "image",
                link: "photo_2026-05-08_17-48-02.jpg"   // ← Bu yerga o'z rasmingizning to'g'ri havolasini qo'ying
            },
            {
                id: 2,
                name: "vacation_photo.png",
                size: "4.2 MB",
                date: "07.05.2026",
                type: "image",
                link: "https://picsum.photos/id/201/800/600"
            },
            {
                id: 3,
                name: "portrait.jpg",
                size: "3.9 MB",
                date: "06.05.2026",
                type: "image",
                link: "https://picsum.photos/id/64/800/600"
            },

            // ==================== VIDEOLAR ====================
            {
                id: 4,
                name: "family_video.mp4",
                size: "285 MB",
                date: "08.05.2026",
                type: "video",
                icon: "🎥",
                link: "#"
            },

            // ==================== HUJJATLAR ====================
            {
                id: 5,
                name: "Shartnoma_2026.pdf",
                size: "1.8 MB",
                date: "08.05.2026",
                type: "document",
                icon: "📄",
                link: "#"
            },

            // ==================== BOSHQALAR ====================
            {
                id: 6,
                name: "Arxiv_fayllar.zip",
                size: "1.45 GB",
                date: "08.05.2026",
                type: "other",
                icon: "📦",
                link: "#"
            }
        ];

        function renderFiles(gridId, filteredFiles) {
            const grid = document.getElementById(gridId);
            grid.innerHTML = '';

            if (filteredFiles.length === 0) {
                grid.innerHTML = `<p class="text-zinc-400 col-span-full text-center py-20 text-lg">Bu bo‘limda hali fayl yo‘q</p>`;
                return;
            }

            filteredFiles.forEach(file => {
                let previewHTML = '';

                if (file.type === "image") {
                    previewHTML = `
                        <img src="${file.link}" 
                             class="image-preview w-full" 
                             alt="${file.name}"
                             onerror="this.src='https://via.placeholder.com/400x300?text=Rasm+topilmadi'">
                    `;
                } else {
                    previewHTML = `
                        <div class="h-52 bg-zinc-800 flex items-center justify-center text-7xl border-b border-zinc-700">
                            ${file.icon || '📁'}
                        </div>
                    `;
                }

                const card = `
                <div class="file-card bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden">
                    ${previewHTML}
                    <div class="p-6">
                        <p class="font-medium line-clamp-2 min-h-[52px]">${file.name}</p>
                        <div class="flex justify-between text-xs text-zinc-400 mt-4">
                            <span>${file.size}</span>
                            <span>${file.date}</span>
                        </div>
                        <a href="${file.link}" target="_blank"
                           class="mt-6 block w-full text-center bg-lime-500 hover:bg-lime-400 active:scale-95 transition-all text-black font-semibold py-3.5 rounded-2xl">
                            <i class="fa-solid fa-download mr-2"></i> Yuklab olish
                        </a>
                    </div>
                </div>`;
                grid.innerHTML += card;
            });
        }

        function showTab(tabIndex) {
            document.querySelectorAll('#tabs button').forEach((btn, i) => {
                if (i === tabIndex) btn.classList.add('tab-active');
                else btn.classList.remove('tab-active');
            });

            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById(`content${tabIndex}`).classList.remove('hidden');

            const typeMap = ['image', 'video', 'document', 'other'];
            const filtered = files.filter(f => f.type === typeMap[tabIndex]);
            renderFiles(`grid${tabIndex}`, filtered);
        }

        function filterCurrentTab() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            
            let activeIndex = 0;
            document.querySelectorAll('#tabs button').forEach((btn, i) => {
                if (btn.classList.contains('tab-active')) activeIndex = i;
            });

            const typeMap = ['image', 'video', 'document', 'other'];
            let filtered = files.filter(f => f.type === typeMap[activeIndex]);

            if (query) {
                filtered = filtered.filter(f => f.name.toLowerCase().includes(query));
            }

            renderFiles(`grid${activeIndex}`, filtered);
        }

        window.onload = () => showTab(0);
    </script>
</body>
</html>
