<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiwi Music</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1e1e2e, #11111b);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            margin-bottom: 20px;
            text-align: center;
        }
        .music-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px;
            width: 90%;
            max-width: 350px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .music-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .cover {
            width: 60px;
            height: 60px;
            background: #fab387;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .title {
            font-weight: bold;
            font-size: 1.1rem;
        }
        .artist {
            color: #a6adc8;
            font-size: 0.9rem;
        }
        audio {
            width: 100%;
            margin-top: 10px;
            height: 35px;
        }
        .btn-main {
            background: #89b4fa;
            color: #11111b;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Kiwi Music 🥝</h1>
        <p>Musiqalar va Rasmlar</p>
    </div>

    <div class="music-card">
        <div class="music-info">
            <div class="cover">🎵</div>
            <div>
                <div class="title">Namuna Musiqa</div>
                <div class="artist">Artist nomi</div>
            </div>
        </div>
        <audio controls>
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
            Sizning brauzeringiz audioni qo'llab-quvvatlamaydi.
        </audio>
    </div>

    <button class="btn-main" onclick="Telegram.WebApp.close()">Botga qaytish</button>

    <script>
        // Telegram WebApp-ni ishga tushirish
        const tg = window.Telegram.WebApp;
        tg.expand(); // Saytni to'liq ekranda ochish
    </script>
</body>
</html>
